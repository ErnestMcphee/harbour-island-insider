<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B4F5C"/>
      <stop offset="55%" stop-color="#3A7684"/>
      <stop offset="100%" stop-color="#1B4F5C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A961" stop-opacity="0"/>
      <stop offset=".5" stop-color="#C9A961"/>
      <stop offset="1" stop-color="#C9A961" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle arcs -->
  <g fill="none" stroke="#C9A961" stroke-opacity=".14" stroke-width="1">
    <circle cx="1040" cy="100" r="260"/>
    <circle cx="1040" cy="100" r="200"/>
    <circle cx="1040" cy="100" r="140"/>
    <circle cx="160" cy="520" r="280"/>
    <circle cx="160" cy="520" r="210"/>
  </g>

  <!-- eyebrow -->
  <g font-family="Inter, -apple-system, Helvetica, sans-serif"
     fill="#C9A961" font-size="22" font-weight="600" letter-spacing="5">
    <line x1="96" y1="148" x2="140" y2="148" stroke="#C9A961" stroke-width="1"/>
    <text x="156" y="154">HARBOUR ISLAND · BAHAMAS</text>
  </g>

  <!-- wordmark -->
  <text x="96" y="300"
        font-family="'Playfair Display', Georgia, serif"
        font-weight="700" font-size="112" fill="#FAF6F0"
        font-style="italic" letter-spacing="-1">
    Harbour Island
  </text>
  <text x="96" y="410"
        font-family="'Playfair Display', Georgia, serif"
        font-weight="400" font-size="96" fill="#C9A961"
        font-style="italic" letter-spacing="-1">
    Insider
  </text>

  <!-- tagline -->
  <text x="96" y="476"
        font-family="Inter, Helvetica, sans-serif"
        font-weight="400" font-size="26" fill="#E8D5B7">
    Independent travel writing · pink sand, diving, marina life.
  </text>

  <!-- gold divider -->
  <rect x="96" y="528" width="320" height="1" fill="url(#gold)"/>

  <!-- url -->
  <text x="96" y="574"
        font-family="Inter, Helvetica, sans-serif"
        font-weight="500" font-size="22" fill="#FAF6F0" opacity=".72"
        letter-spacing="2">
    ERNESTMCPHEE.GITHUB.IO/HARBOUR-ISLAND-INSIDER
  </text>
</svg>
