name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so per-file lastmod can be derived from `git log`.
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate sitemap.xml from frontend/*.html
        run: |
          chmod +x ./scripts/generate-sitemap.sh
          ./scripts/generate-sitemap.sh

      - name: Upload frontend/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
